name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  acceptance:
    name: Linux acceptance (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 (v4)

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0 (v4)
        with:
          version: 11.12.0

      - name: Install Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0 (v4)
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust 1.97 and wasm target
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-18
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
          components: clippy,rustfmt

      - name: Cache Cargo registry and target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0 (v4)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-1.97-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.97-

      - name: Install wasm-pack 0.13.1
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run complete acceptance sequence
        run: |
          source "$HOME/.cargo/env"
          cargo fmt --manifest-path core/Cargo.toml --all -- --check
          cargo clippy --manifest-path core/Cargo.toml --workspace --all-targets -- -D warnings
          cargo test --manifest-path core/Cargo.toml --workspace
          cargo check --manifest-path core/Cargo.toml -p kiriko-wasm --target wasm32-unknown-unknown
          pnpm install --frozen-lockfile
          pnpm core:build
          pnpm typecheck
          pnpm test
          pnpm test:server
          pnpm build
          pnpm exec playwright test --project=chromium
          pnpm exec playwright test --project=firefox
          npx -y node@24 -e "const core=require('./core/crates/kiriko-node'); if(typeof core.compileImdf!=='function'||typeof core.inspectBundle!=='function') process.exit(1)"

  native-addon:
    name: Native addon (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [24, 26]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 (v4)

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0 (v4)
        with:
          version: 11.12.0

      - name: Install Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0 (v4)
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install Rust 1.97
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-18
        with:
          toolchain: 1.97.0

      - name: Cache Cargo registry and target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0 (v4)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-1.97-node-${{ matrix.node }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.97-node-${{ matrix.node }}-
            ${{ runner.os }}-cargo-1.97-

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and require native addon
        run: |
          pnpm core:build:node
          node -e "const core=require('./core/crates/kiriko-node'); if(typeof core.compileImdf!=='function'||typeof core.inspectBundle!=='function') process.exit(1)"
